<!-- templates/auth/signup.html -->
{% extends 'base.html' %}

{% block title %}Sign Up — Trader's Journal{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">

        <!-- Header -->
        <div class="auth-header">
            <h2>📈 Create Account</h2>
            <p>Start tracking your trades today</p>
        </div>

        <!-- Signup Form -->
        <!--
            action=""     → submit to the SAME URL (/signup)
            method="POST" → send data hidden in request body
        -->
        <form action="" method="POST" class="auth-form">

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="e.g. rahul_trader" required minlength="3">
                <small>Minimum 3 characters. No spaces.</small>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Minimum 6 characters" required
                    minlength="6">
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password"
                    placeholder="Re-enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-full">
                Create Account
            </button>

        </form>

        <!-- Link to Login -->
        <div class="auth-footer">
            Already have an account?
            <a href="{{ url_for('login') }}">Log In</a>
        </div>

    </div>
</div>
{% endblock %}
