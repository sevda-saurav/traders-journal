<!-- templates/feedback.html -->
{% extends 'base.html' %}
{% block title %}Feedback — Trader's Journal{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card" style="max-width:540px;">

        <div class="auth-header">
            <h2>💬 Share Your Feedback</h2>
            <p>Help us improve Trader's Journal</p>
        </div>

        <form action="" method="POST" class="auth-form">

            <!-- Name -->
            <div class="form-group">
                <label for="name">Your Name *</label>
                <input type="text" id="name" name="name" value="{{ username }}" required>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" name="email" value="{{ email }}" required>
            </div>

            <!-- Category -->
            <div class="form-group">
                <label for="category">Feedback Type *</label>
                <select id="category" name="category" required>
                    <option value="">-- Select Type --</option>
                    <option value="General">💬 General Feedback</option>
                    <option value="Bug Report">🐛 Bug Report</option>
                    <option value="Suggestion">💡 Suggestion</option>
                    <option value="Compliment">⭐ Compliment</option>
                </select>
            </div>

            <!-- Star Rating -->
            <div class="form-group">
                <label>Rate Your Experience *</label>
                <div class="star-rating">
                    <!--
                        Stars work in reverse order (5 to 1) because
                        of a CSS trick using the ~ sibling selector.
                        Clicking a star highlights it and all before it.
                    -->
                    {% for i in [5, 4, 3, 2, 1] %}
                    <input type="radio" id="star{{ i }}" name="rating" value="{{ i }}" {% if i==5 %}checked{% endif %}>
                    <label for="star{{ i }}" title="{{ i }} star{{ 's' if i > 1 }}">
                        ★
                    </label>
                    {% endfor %}
                </div>
            </div>

            <!-- Message -->
            <div class="form-group">
                <label for="message">Your Message *</label>
                <textarea id="message" name="message" rows="5"
                    placeholder="Tell us what you think, what could be improved, or report a bug..." required
                    minlength="10"></textarea>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-primary btn-full">
                Send Feedback 🚀
            </button>

        </form>
    </div>
</div>
{% endblock %}
