<!-- templates/trades/add_trade.html -->
{% extends 'base.html' %}
{% block title %}Add Trade — Trader's Journal{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-card">

        <div class="form-card-header">
            <h2>➕ Log New Trade</h2>
            <p>Fill in your trade details below</p>
        </div>

        <form action="" method="POST" enctype="multipart/form-data" class="trade-form">
            <!--
            enctype="multipart/form-data" is REQUIRED when your form
            has a file upload field. Without it, the file won't be sent.
        -->

            <!-- Row 1: Market & Date -->
            <div class="form-row">
                <div class="form-group">
                    <label for="market_name">Market *</label>
                    <select id="market_name" name="market_name" required onchange="toggleCustomMarket(this)">
                        <option value="">-- Select Market --</option>
                        <option value="Indian Stock Market">Indian Stock Market</option>
                        <option value="Crypto">Crypto</option>
                        <option value="Forex">Forex</option>
                        <option value="Commodity">Commodity</option>
                        <option value="Metal">Metal</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <!-- Hidden by default — shown only if "Other" is selected -->
                <div class="form-group" id="custom_market_group" style="display:none;">
                    <label for="custom_market">Specify Market *</label>
                    <input type="text" id="custom_market" name="custom_market" placeholder="e.g. US Stocks, Options...">
                </div>

                <div class="form-group">
                    <label for="trade_date">Date & Time *</label>
                    <input type="datetime-local" id="trade_date" name="trade_date" required>
                </div>
            </div>

            <!-- Row 2: Trade Type & Capital -->
            <div class="form-row">
                <div class="form-group">
                    <label for="trade_type">Trade Type *</label>
                    <select id="trade_type" name="trade_type" required>
                        <option value="">-- Select Type --</option>
                        <option value="Long">📈 Long (Buy)</option>
                        <option value="Short">📉 Short (Sell)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="capital">Capital Used (₹) *</label>
                    <input type="number" id="capital" name="capital" placeholder="e.g. 10000" step="0.01" min="0.01"
                        required>
                </div>
            </div>

            <!-- Row 3: Buy & Sell Values -->
            <div class="form-row">
                <div class="form-group">
                    <label for="buy_value">Entry Price *</label>
                    <input type="number" id="buy_value" name="buy_value" placeholder="e.g. 1500.50" step="0.01"
                        min="0.01" required oninput="autoCalculate()">
                </div>

                <div class="form-group">
                    <label for="sell_value">Exit Price *</label>
                    <input type="number" id="sell_value" name="sell_value" placeholder="e.g. 1600.00" step="0.01"
                        min="0.01" required oninput="autoCalculate()">
                </div>
            </div>

            <!-- Row 4: Target & Stop Loss -->
            <div class="form-row">
                <div class="form-group">
                    <label for="target">Target Price *</label>
                    <input type="number" id="target" name="target" placeholder="e.g. 1650.00" step="0.01" min="0.01"
                        required oninput="autoCalculate()">
                </div>

                <div class="form-group">
                    <label for="stop_loss">Stop Loss *</label>
                    <input type="number" id="stop_loss" name="stop_loss" placeholder="e.g. 1450.00" step="0.01"
                        min="0.01" required oninput="autoCalculate()">
                </div>
            </div>

            <!-- Auto-calculated preview -->
            <div class="calc-preview" id="calc_preview" style="display:none;">
                <div class="calc-item">
                    <span class="calc-label">Estimated P&L</span>
                    <span class="calc-value" id="preview_pnl">—</span>
                </div>
                <div class="calc-item">
                    <span class="calc-label">Risk : Reward</span>
                    <span class="calc-value" id="preview_rr">—</span>
                </div>
            </div>

            <!-- Description -->
            <div class="form-group">
                <label for="description">Notes / Analysis</label>
                <textarea id="description" name="description" rows="4"
                    placeholder="What was your setup? Why did you take this trade? What did you learn?"></textarea>
            </div>

            <!-- Screenshot Upload -->
            <div class="form-group">
                <label for="screenshot">Chart Screenshot</label>
                <input type="file" id="screenshot" name="screenshot" accept="image/*" onchange="previewImage(this)">
                <small>Optional. PNG, JPG, GIF or WEBP only.</small>
                <!-- Image preview box -->
                <img id="image_preview" src="#" alt="Preview" style="display:none; max-width:100%;
                            margin-top:0.5rem; border-radius:8px;">
            </div>

            <!-- Submit -->
            <div class="form-actions">
                <a href="{{ url_for('view_trades') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">
                    Save Trade 💾
                </button>
            </div>

        </form>
    </div>
</div>
{% endblock %}
